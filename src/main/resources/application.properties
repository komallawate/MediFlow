spring.application.name=mediflow-backend

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/mediflowdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
mediflow.jwt.secret=MediFlowSuperSecretKeyThatIsAtLeast256BitsLong2024!@#
mediflow.jwt.expiration=86400000

# Server
server.port=8081